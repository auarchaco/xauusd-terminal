<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v24 Turbo</title>
    <style>
        :root { --gold: #D4A017; --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .terminal { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); overflow: hidden; }
        .header { background: #0f172a; padding: 25px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; color: var(--gold); letter-spacing: 3px; font-weight: 800; }
        .status-badge { font-size: 10px; color: var(--accent); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--accent); font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .pulse { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse-animation 1.5s infinite; }
        @keyframes pulse-animation { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 15px; }
        .btn-scan { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-scan:hover { background: #eab308; transform: translateY(-2px); }
        .btn-scan:disabled { opacity: 0.6; cursor: wait; }
        #output { background: #0f172a; padding: 20px; border-radius: 12px; border-left: 4px solid var(--gold); min-height: 180px; font-size: 14px; line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; border: 1px solid var(--border); }
        .loader { color: var(--gold); font-weight: bold; text-align: center; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>GOLD ELITE v24</h1>
            <div id="clock" style="font-family: monospace; font-size: 12px; color: #94a3b8; margin-top: 5px;">00:00:00 NY</div>
        </div>
        <div class="status-badge"><div class="pulse"></div> TURBO ENGINE</div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div><label>SL Pips</label><input type="number" id="sl" value="20"></div>
        </div>
        <button class="btn-scan" id="scan-btn" onclick="ejecutarAnalisis()">⚡ ESCANEO INSTANTÁNEO</button>
        <div id="output">Terminal v21-Core activa.</div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";
    let cachedModel = "models/gemini-1.5-flash"; // Fallback veloz

    // Sincronización de reloj NY
    setInterval(() => {
        document.getElementById('clock').textContent = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date()) + ' NY';
    }, 1000);

    // MEJORA DE VELOCIDAD: Pre-detección de modelo apenas carga la web
    async function preWarm() {
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${API_KEY}`);
            const d = await r.json();
            if (d.models) {
                const best = d.models.find(m => m.name.includes('gemini-1.5-flash'));
                if (best) cachedModel = best.name;
            }
        } catch (e) { console.log("Warm-up bypass"); }
    }
    preWarm();

    async function ejecutarAnalisis() {
        const box = document.getElementById('output');
        const btn = document.getElementById('scan-btn');
        const bal = document.getElementById('balance').value;

        btn.disabled = true;
        box.innerHTML = '<div class="loader">⚡ PROCESANDO...</div>';

        // Prompt minimalista para respuesta rápida
        const prompt = `Trader XAUUSD. Balance $${bal}. Dame: Dirección, Entrada, SL, TP, Lotes. Veredicto: OPERAR/NO OPERAR.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/${cachedModel}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { maxOutputTokens: 200, temperature: 0.4 } // Optimización de latencia
                })
            });

            const data = await response.json();
            box.innerText = data.candidates[0].content.parts[0].text;

        } catch (e) {
            box.innerHTML = `<b style="color:#ef4444;">REINTENTANDO...</b>`;
            setTimeout(ejecutarAnalisis, 500);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
