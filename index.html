<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Terminal V10.1 · Fixed</title>
    <style>
        :root {
            --gold: #B8860B; --gold-mid: #D4A017; --dark: #0D0D1A;
            --blue: #0D47A1; --border: #E0E0E0; --bg: #FAFAFA;
            --white: #FFFFFF; --text: #212121; --font: 'Segoe UI', Arial, sans-serif;
            --mono: 'Courier New', monospace; --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: #111827; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px 16px; }
        .app { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px; }
        .header { background: var(--dark); border: 1.5px solid var(--gold-mid); border-radius: var(--radius); padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .header h1 { font-size: 20px; color: var(--gold-mid); }
        #clock { font-family: var(--mono); color: #CCC; font-size: 14px; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
        .card-title { font-size: 11px; font-weight: 700; color: #757575; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .api-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: var(--mono); font-size: 13px; background: #f9f9f9; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tile { background: #f5f5f5; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        .tile label { font-size: 10px; font-weight: bold; display: block; margin-bottom: 4px; }
        .scan-btn { width: 100%; padding: 16px; background: var(--dark); border: 1.5px solid var(--gold); border-radius: var(--radius); color: var(--gold-mid); font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .scan-btn:disabled { opacity: 0.5; }
        .response-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .response-header { background: var(--dark); padding: 10px 18px; color: var(--gold-mid); font-size: 13px; font-weight: 600; }
        .response-body { padding: 20px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; min-height: 100px; }
        .spinner { width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { color: #B71C1C; font-weight: bold; padding: 10px; background: #FFEBEE; border-radius: 4px; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div>
            <h1>⚡ XAUUSD TERMINAL</h1>
            <p style="font-size: 10px; color: #888;">Protocolo de Conexión Estable</p>
        </div>
        <div id="clock">00:00:00 NY</div>
    </div>

    <div class="card">
        <div class="card-title">🔑 Google API Key</div>
        <div style="display: flex; gap: 8px;">
            <input type="password" id="api-key" class="api-input" placeholder="AIzaSy...">
            <button onclick="saveKey()" style="padding: 0 15px; border-radius: 6px; cursor: pointer; background: #eee; font-weight: bold;">GUARDAR</button>
        </div>
        <div id="key-status" style="font-size: 10px; margin-top: 5px;"></div>
    </div>

    <div class="card" style="border-left: 4px solid var(--blue);">
        <div class="card-title">⚖️ Gestión de Riesgo</div>
        <div class="grid-3">
            <div class="tile">
                <label>Balance ($)</label>
                <input type="number" id="balance" value="1000" class="api-input">
            </div>
            <div class="tile">
                <label>Riesgo (%)</label>
                <input type="number" id="risk" value="1" class="api-input">
            </div>
            <div class="tile">
                <label>SL (Pips)</label>
                <input type="number" id="sl" value="20" class="api-input">
            </div>
        </div>
        <div id="lot-info" style="margin-top: 10px; font-weight: bold; color: var(--blue); text-align: center;">LOTAJE: 0.05</div>
    </div>

    <button id="scan-btn" class="scan-btn" onclick="runScan()">⚡ ANALIZAR MERCADO</button>

    <div class="response-card">
        <div class="response-header">RESULTADO DEL ANÁLISIS</div>
        <div id="response-body" class="response-body">Presiona el botón para iniciar...</div>
    </div>
</div>

<script>
    setInterval(() => {
        const time = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = time + ' NY';
    }, 1000);

    function saveKey() {
        const key = document.getElementById('api-key').value.trim();
        if(!key) return alert("Pega una clave válida");
        localStorage.setItem('gemini_api_key', key);
        document.getElementById('key-status').innerHTML = '<span style="color:green; font-weight:bold;">✓ CLAVE GUARDADA CORRECTAMENTE</span>';
    }

    window.onload = () => {
        const saved = localStorage.getItem('gemini_api_key');
        if (saved) {
            document.getElementById('api-key').value = saved;
            document.getElementById('key-status').innerHTML = '<span style="color:blue;">Clave cargada desde memoria</span>';
        }
        updateLot();
    };

    function updateLot() {
        const bal = parseFloat(document.getElementById('balance').value) || 0;
        const rsk = (parseFloat(document.getElementById('risk').value) || 0) / 100;
        const pips = parseFloat(document.getElementById('sl').value) || 0;
        if (bal > 0 && pips > 0) {
            const lotage = (bal * rsk) / (pips * 10);
            document.getElementById('lot-info').textContent = `LOTAJE RECOMENDADO: ${lotage.toFixed(2)}`;
        }
    }
    ['balance', 'risk', 'sl'].forEach(id => document.getElementById(id).addEventListener('input', updateLot));

    async function runScan() {
        const key = localStorage.getItem('gemini_api_key');
        const btn = document.getElementById('scan-btn');
        const box = document.getElementById('response-body');

        if (!key) {
            alert("Error: No has guardado ninguna API Key.");
            return;
        }

        btn.disabled = true;
        box.innerHTML = '<div class="spinner"></div> <b>CONECTANDO CON GOOGLE AI (V1)...</b>';

        const context = "Eres un analista de XAUUSD. Dame un análisis rápido de DXY y Oro. Indica: Dirección, Entrada, SL, TP y si es momento de OPERAR o NO OPERAR.";

        try {
            // Cambio a v1 y modelo estable
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: context }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                throw new Error(`${data.error.status}: ${data.error.message}`);
            }

            if (data.candidates && data.candidates[0].content) {
                box.innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("La API no devolvió contenido. Verifica tu cuota en Google AI Studio.");
            }

        } catch (e) {
            box.innerHTML = `<div class="error-msg">⚠️ ERROR DE API:</div><div style="font-size:12px; margin-top:5px;">${e.message}</div><br><small>Asegúrate de que tu Key esté activa en aistudio.google.com</small>`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
