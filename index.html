<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Terminal V11.0 · Gemini 2.0</title>
    <style>
        :root {
            --gold: #D4A017; --dark: #0D0D1A; --blue: #0D47A1;
            --white: #FFFFFF; --font: 'Segoe UI', Arial, sans-serif;
            --mono: 'Courier New', monospace; --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: #0f172a; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app { width: 100%; max-width: 850px; display: flex; flex-direction: column; gap: 15px; }
        .header { background: var(--dark); border: 1px solid var(--gold); border-radius: var(--radius); padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .card { background: white; border-radius: var(--radius); padding: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: var(--mono); }
        .btn-main { width: 100%; padding: 18px; background: var(--dark); color: var(--gold); border: 2px solid var(--gold); border-radius: var(--radius); font-weight: bold; cursor: pointer; font-size: 16px; }
        .response-area { background: white; border-radius: var(--radius); min-height: 200px; padding: 20px; border: 1px solid #ddd; line-height: 1.6; white-space: pre-wrap; }
        .spinner { width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div>
            <h2 style="color: var(--gold)">⚡ XAUUSD GEMINI 2.0</h2>
            <p style="font-size: 12px; opacity: 0.8;">Advanced Scalping Protocol</p>
        </div>
        <div id="clock">--:--:-- NY</div>
    </div>

    <div class="card">
        <label style="font-size: 11px; font-weight: bold;">CONFIGURACIÓN API</label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <input type="password" id="api-key" style="flex: 1;" placeholder="Pega tu API Key de Google AI Studio">
            <button onclick="saveKey()" style="padding: 10px 20px; background: #eee; border: 1px solid #ccc; cursor: pointer; border-radius: 6px;">Guardar</button>
        </div>
    </div>

    <div class="card">
        <div class="grid">
            <div class="input-group"><label style="font-size: 11px;">BALANCE ($)</label><input type="number" id="balance" value="1000"></div>
            <div class="input-group"><label style="font-size: 11px;">RIESGO (%)</label><input type="number" id="risk" value="1"></div>
            <div class="input-group"><label style="font-size: 11px;">STOP LOSS (PIPS)</label><input type="number" id="sl" value="20"></div>
        </div>
    </div>

    <button class="btn-main" id="scan-btn" onclick="runScan()">⚡ ANALIZAR CON GEMINI 2.0 FLASH</button>

    <div class="response-area" id="response-body">El análisis aparecerá aquí...</div>
</div>

<script>
    function updateClock() {
        const now = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = now + ' NY';
    }
    setInterval(updateClock, 1000);

    function saveKey() {
        const key = document.getElementById('api-key').value.trim();
        localStorage.setItem('gemini_api_key', key);
        alert("API Key guardada localmente.");
    }

    window.onload = () => {
        const saved = localStorage.getItem('gemini_api_key');
        if (saved) document.getElementById('api-key').value = saved;
    };

    async function runScan() {
        const key = localStorage.getItem('gemini_api_key');
        const btn = document.getElementById('scan-btn');
        const box = document.getElementById('response-body');

        if (!key) return alert("Ingresa tu API Key primero.");

        btn.disabled = true;
        box.innerHTML = '<div class="spinner"></div> <b>Gemini 2.0 analizando mercados en tiempo real...</b>';

        const prompt = "Actúa como experto en trading institucional de Oro. Analiza DXY y XAUUSD. Dame una señal de scalping: Dirección, Entrada, SL, TP y un SCORE de 0 a 10. Indica si debo OPERAR o NO OPERAR.";

        try {
            // Utilizamos gemini-2.0-flash-exp que es el modelo más reciente y potente
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            if (data.candidates && data.candidates[0].content) {
                box.innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("No se pudo generar contenido. Revisa tu API Key.");
            }

        } catch (e) {
            box.innerHTML = `<span style="color:red; font-weight:bold;">⚠️ ERROR DE VERSIÓN:</span><br>${e.message}<br><br><small>Si el error persiste, es posible que tu Key no tenga habilitado Gemini 2.0 aún. Intenta cambiar '2.0-flash-exp' por '1.5-flash' en el código.</small>`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
