<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Terminal · V13.0</title>
    <style>
        :root { --gold: #D4A017; --dark: #0f172a; }
        body { font-family: sans-serif; background: #020617; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 8px; margin-top: 5px; }
        .btn { width: 100%; padding: 18px; background: var(--gold); color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #response { background: #0f172a; border-radius: 12px; padding: 20px; border: 1px solid var(--gold); min-height: 100px; white-space: pre-wrap; margin-top: 10px; line-height: 1.5; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--gold); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app">
    <div class="card">
        <h2 style="color: var(--gold); margin-bottom: 10px;">⚡ XAUUSD ANALYZER V13</h2>
        <label style="font-size: 12px;">API KEY DE GOOGLE AI STUDIO:</label>
        <input type="password" id="api-key" placeholder="AIzaSy...">
        <button onclick="save()" style="margin-top: 10px; padding: 5px; cursor: pointer;">Guardar Clave</button>
    </div>

    <div class="card">
        <label style="font-size: 12px;">BALANCE DE CUENTA ($):</label>
        <input type="number" id="balance" value="1000">
        <button class="btn" id="btn" onclick="analizar()" style="margin-top: 20px;">⚡ ANALIZAR ORO</button>
    </div>

    <div id="response">Esperando acción...</div>
</div>

<script>
    function save() {
        const k = document.getElementById('api-key').value;
        localStorage.setItem('gem_key_v13', k);
        alert("Clave guardada");
    }

    window.onload = () => {
        const saved = localStorage.getItem('gem_key_v13');
        if (saved) document.getElementById('api-key').value = saved;
    }

    async function analizar() {
        const key = localStorage.getItem('gem_key_v13');
        const box = document.getElementById('response');
        const btn = document.getElementById('btn');

        if (!key) return alert("Falta la clave");

        btn.disabled = true;
        box.innerHTML = '<div class="spinner"></div> Analizando mercado...';

        const prompt = "Eres un trader pro de XAUUSD. Analiza el Oro y DXY. Dame: Sesgo, Entrada, SL, TP y Veredicto (Operar/No operar). Sé breve.";

        try {
            // Usamos la URL v1 (estable) y el modelo 1.5-flash (disponibilidad total)
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await resp.json();

            // Verificación paso a paso para evitar error "undefined"
            if (data.error) {
                box.innerHTML = `<b style="color:red;">Error de Google:</b><br>${data.error.message}`;
            } else if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                box.innerText = data.candidates[0].content.parts[0].text;
            } else {
                box.innerHTML = `<b style="color:orange;">Respuesta inesperada:</b><br>La API no devolvió texto. Revisa si tu clave tiene restricciones de región.`;
            }

        } catch (e) {
            box.innerHTML = `<b style="color:red;">Error de Conexión:</b><br>${e.message}`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
