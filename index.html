<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal</title>
    <style>
        :root {
            --gold: #D4A017;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .terminal {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .header {
            background: #0f172a;
            padding: 25px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 1.2rem; color: var(--gold); letter-spacing: 2px; }

        .content { padding: 25px; display: flex; flex-direction: column; gap: 20px; }

        .group { display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--gold); }

        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .btn-scan {
            width: 100%;
            padding: 18px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-scan:hover { background: #b8860b; transform: translateY(-2px); }

        .btn-scan:disabled { background: #475569; transform: none; cursor: not-allowed; }

        #output {
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--gold);
            min-height: 150px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #cbd5e1;
        }

        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .loading-text { color: var(--gold); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>XAUUSD ELITE v16</h1>
            <p style="font-size: 10px; color: #94a3b8;"><span class="status-dot"></span> SISTEMA OPERATIVO</p>
        </div>
        <div id="clock" style="font-family: monospace; font-size: 14px;">--:--:-- NY</div>
    </div>

    <div class="content">
        <div class="group">
            <label>API Key de Google Studio</label>
            <input type="password" id="api-key" placeholder="••••••••••••••••••••••••••••••••••••">
        </div>

        <div class="grid-inputs">
            <div class="group"><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div class="group"><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div class="group"><label>Stop Loss</label><input type="number" id="sl" value="20"></div>
        </div>

        <button class="btn-scan" id="scan-btn" onclick="ejecutarTerminal()">Ejecutar Análisis Macro</button>

        <div id="output">Esperando inicialización de datos...</div>
    </div>
</div>

<script>
    // Reloj NY Realista
    setInterval(() => {
        const now = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = now + ' NY';
    }, 1000);

    // Carga inicial de datos guardados
    window.onload = () => {
        const savedKey = localStorage.getItem('terminal_key_v16');
        if (savedKey) document.getElementById('api-key').value = savedKey;
    };

    async function ejecutarTerminal() {
        const key = document.getElementById('api-key').value.trim();
        const box = document.getElementById('output');
        const btn = document.getElementById('scan-btn');
        const bal = document.getElementById('balance').value;

        if (!key) return alert("Error: API Key requerida");
        
        localStorage.setItem('terminal_key_v16', key); // Guardado automático
        
        btn.disabled = true;
        box.innerHTML = '<span class="loading-text">Conectando con Red Neural de Google...</span>';

        const prompt = `Analiza XAUUSD y DXY. Dame: 1. Dirección, 2. Entrada, SL, TP, 3. Lotes para cuenta de ${bal} USD. Sé breve.`;

        // Lógica Multimodelo para evitar el error "Not Found"
        const modelos = ["gemini-1.5-flash", "gemini-pro"];
        let exito = false;

        for (let m of modelos) {
            if (exito) break;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    box.innerText = data.candidates[0].content.parts[0].text;
                    exito = true;
                }
            } catch (e) { console.error("Fallo en " + m); }
        }

        if (!exito) {
            box.innerHTML = '<b style="color:#f87171;">ERROR CRÍTICO:</b> No se pudo establecer conexión. Verifica que tu Key sea de Google AI Studio.';
        }
        btn.disabled = false;
    }
</script>

</body>
</html>
