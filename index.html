<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v21.5 - Tables</title>
    <style>
        :root { --gold: #D4A017; --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .terminal { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.7); overflow: hidden; }
        .header { background: #0f172a; padding: 25px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; color: var(--gold); letter-spacing: 3px; font-weight: 800; }
        .content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 10px; font-family: monospace; font-size: 15px; outline: none; }
        .btn-scan { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        
        /* Estilos de las Tablas Solicitadas */
        .trade-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; border: 1px solid var(--border); background: #0f172a; border-radius: 8px; overflow: hidden; }
        .trade-table th { background: #1e293b; color: var(--gold); font-size: 10px; padding: 8px; text-transform: uppercase; }
        .trade-table td { padding: 12px; text-align: center; border: 1px solid var(--border); font-family: monospace; font-size: 15px; }
        
        #output { background: #0f172a; padding: 20px; border-radius: 12px; border-left: 4px solid var(--gold); font-size: 13px; line-height: 1.6; color: #cbd5e1; white-space: pre-wrap; border: 1px solid var(--border); }
        .loading { color: var(--gold); font-weight: bold; text-align: center; display: block; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>GOLD ELITE v21.5</h1>
            <div id="clock" style="font-family: monospace; font-size: 12px; color: #94a3b8; margin-top: 5px;">00:00:00 NY TIME</div>
        </div>
        <div style="color: var(--accent); font-size: 10px; font-weight: bold; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px;">TABLAS ACTIVAS</div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div><label>SL Pips</label><input type="number" id="sl" value="20"></div>
        </div>
        <button class="btn-scan" id="scan-btn" onclick="ejecutarAnalisis()">Ejecutar Escaneo Macro</button>
        
        <div id="tables-area"></div>

        <div id="output">Terminal v21.5 lista.</div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    setInterval(() => {
        const ny = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = ny + ' NY TIME';
    }, 1000);

    async function ejecutarAnalisis() {
        const box = document.getElementById('output');
        const tablesArea = document.getElementById('tables-area');
        const btn = document.getElementById('scan-btn');
        btn.disabled = true;
        tablesArea.innerHTML = '';
        box.innerHTML = '<div class="loading">Sincronizando con Google AI...</div>';

        try {
            const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;
            const listResp = await fetch(listUrl);
            const listData = await listResp.json();
            const model = listData.models.find(m => m.name.includes('gemini-1.5-flash')) || listData.models[0];

            const prompt = `Analiza XAUUSD y DXY. 
            IMPORTANTE: Empieza tu respuesta con estos datos exactos:
            Entrada: [valor]
            SL: [valor]
            TP: [valor]
            Direccion: [BUY/SELL]
            Lotes: [valor]
            Veredicto: [OPERAR/NO OPERAR]
            Luego da una explicación breve. Datos cuenta: $${document.getElementById('balance').value}, Riesgo ${document.getElementById('risk').value}%, SL ${document.getElementById('sl').value} pips.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model.name}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                const texto = data.candidates[0].content.parts[0].text;
                
                // Extraer datos para las tablas (Regex)
                const entrada = texto.match(/Entrada:\s*(.*)/i)?.[1] || "---";
                const sl = texto.match(/SL:\s*(.*)/i)?.[1] || "---";
                const tp = texto.match(/TP:\s*(.*)/i)?.[1] || "---";
                const direccion = texto.match(/Direccion:\s*(.*)/i)?.[1] || "---";
                const lotes = texto.match(/Lotes:\s*(.*)/i)?.[1] || "---";
                const veredicto = texto.match(/Veredicto:\s*(.*)/i)?.[1] || "---";

                // Inyectar Tablas
                tablesArea.innerHTML = `
                    <table class="trade-table">
                        <tr><th>Entrada</th><th>SL</th><th>TP</th></tr>
                        <tr><td>${entrada}</td><td>${sl}</td><td>${tp}</td></tr>
                    </table>
                    <table class="trade-table">
                        <tr><th>Direccion</th><th>Lotes</th><th>Veredicto</th></tr>
                        <tr><td style="color:var(--gold)">${direccion}</td><td>${lotes}</td><td>${veredicto}</td></tr>
                    </table>
                `;

                box.innerText = texto;
            } else {
                box.innerHTML = "Google no envió datos. Pulsa de nuevo.";
            }

        } catch (e) {
            box.innerHTML = `<b style="color:#ef4444;">ERROR:</b> Reintenta en 10 seg.`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
