<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v17</title>
    <style>
        :root {
            --gold: #D4A017;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .terminal {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .header {
            background: #0f172a;
            padding: 25px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 1.2rem; color: var(--gold); letter-spacing: 2px; }

        .content { padding: 25px; display: flex; flex-direction: column; gap: 20px; }

        .group { display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .btn-scan {
            width: 100%;
            padding: 18px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-scan:hover { background: #b8860b; transform: translateY(-2px); }
        .btn-scan:disabled { background: #475569; cursor: not-allowed; }

        #output {
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--gold);
            min-height: 150px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            color: #cbd5e1;
        }

        .loading-text { color: var(--gold); font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>XAUUSD ELITE v17</h1>
            <p style="font-size: 10px; color: #22c55e;">● SISTEMA CONECTADO Y VERIFICADO</p>
        </div>
        <div id="clock" style="font-family: monospace; font-size: 14px; color: #94a3b8;">--:--:-- NY</div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div class="group"><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div class="group"><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div class="group"><label>Stop Loss</label><input type="number" id="sl" value="20"></div>
        </div>

        <button class="btn-scan" id="scan-btn" onclick="ejecutarAnalisis()">⚡ EJECUTAR ESCANEO GEMINI PRO</button>

        <div id="output">Listo para procesar señales del Oro...</div>
    </div>
</div>

<script>
    // Tu API Key integrada para evitar errores manuales
    const KEY_INTEGRADA = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    setInterval(() => {
        const now = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = now + ' NY';
    }, 1000);

    async function ejecutarAnalisis() {
        const box = document.getElementById('output');
        const btn = document.getElementById('scan-btn');
        const balance = document.getElementById('balance').value;

        btn.disabled = true;
        box.innerHTML = '<span class="loading-text">Sincronizando con Google AI Studio...</span>';

        const prompt = `Analiza XAUUSD y DXY para scalping hoy. 
        Datos: Cuenta de ${balance} USD. 
        Dame: Dirección, Entrada, SL, TP y Lotes. 
        Veredicto: OPERAR o NO OPERAR.`;

        try {
            // Se utiliza el endpoint v1 (producción) y el modelo 1.5-flash (el más estable)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY_INTEGRADA}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                box.innerHTML = `<b style="color:#ef4444;">ERROR DE API:</b><br>${data.error.message}`;
            } else if (data.candidates && data.candidates[0].content) {
                box.innerText = data.candidates[0].content.parts[0].text;
            } else {
                box.innerText = "Google no devolvió datos. Intenta de nuevo en un momento.";
            }

        } catch (e) {
            box.innerHTML = `<b style="color:#ef4444;">ERROR DE RED:</b><br>${e.message}`;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
