<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v22</title>
    <style>
        :root { --gold: #D4A017; --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .terminal { width: 100%; max-width: 700px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); overflow: hidden; }
        .header { background: #0f172a; padding: 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; font-weight: 800; }
        .content { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 8px; font-family: monospace; font-size: 14px; }
        .btn-scan { width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-scan:hover { background: #eab308; }
        .btn-scan:disabled { background: #475569; cursor: not-allowed; }

        /* ESTILOS DE TABLA Y RESULTADOS */
        .gold-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; border: 1px solid var(--gold); }
        .gold-table th { background: var(--gold); color: black; padding: 8px; font-size: 11px; text-transform: uppercase; }
        .gold-table td { border: 1px solid var(--gold); padding: 12px; text-align: center; font-weight: bold; font-family: monospace; font-size: 16px; color: white; }
        
        .verdict-box { display: flex; justify-content: space-between; padding: 15px; background: #0f172a; border-radius: 8px; margin-bottom: 15px; border: 1px solid #475569; }
        .verdict-val { font-weight: 900; font-size: 18px; color: #3b82f6; } /* Color Azul para lotes/veredicto */
        
        #analysis-text { font-size: 13px; line-height: 1.5; color: #94a3b8; white-space: pre-wrap; padding-top: 10px; border-top: 1px ridge #334155; }
        .loader { color: var(--gold); font-weight: bold; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <h1>XAUUSD ELITE v22</h1>
        <div id="clock" style="font-family: monospace; font-size: 14px; color: #94a3b8;">--:--:-- NY</div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div><label>SL Pips</label><input type="number" id="sl" value="20"></div>
        </div>
        
        <button class="btn-scan" id="scan-btn" onclick="ejecutarAnalisisRapido()">⚡ ESCANEO INSTANTÁNEO M1</button>
        
        <div id="result-container" style="display: none;">
            <table class="gold-table">
                <thead>
                    <tr><th>Dirección</th><th>Entrada</th><th>Stop Loss</th><th>Take Profit</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            
            <div class="verdict-box">
                <div><label>Lotes:</label> <span id="res-lotes" class="verdict-val">--</span></div>
                <div><label>Veredicto:</label> <span id="res-veredicto" class="verdict-val">--</span></div>
            </div>

            <div id="analysis-text"></div>
        </div>
        <div id="status"></div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    setInterval(() => {
        const ny = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = ny + ' NY';
    }, 1000);

    async function ejecutarAnalisisRapido() {
        const btn = document.getElementById('scan-btn');
        const status = document.getElementById('status');
        const container = document.getElementById('result-container');
        
        btn.disabled = true;
        container.style.display = 'none';
        status.innerHTML = '<div class="loader">PROCESANDO MACRO-DATA...</div>';

        const prompt = `Eres un sistema de trading de alta frecuencia para XAUUSD. 
        Analiza Oro/DXY y responde ÚNICAMENTE en este formato JSON estricto para rapidez:
        {
          "dir": "COMPRA/VENTA/NEUTRAL",
          "ent": "precio",
          "sl": "precio",
          "tp": "precio",
          "lotes": "cálculo para ${document.getElementById('balance').value} USD",
          "ver": "OPERAR/NO OPERAR",
          "ana": "análisis de 2 líneas"
        }`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.1, topP: 0.1 } // Mínima aleatoriedad = Máxima rapidez
                })
            });

            const data = await response.json();
            const rawText = data.candidates[0].content.parts[0].text;
            
            // Extraer JSON de la respuesta
            const cleanJson = rawText.substring(rawText.indexOf('{'), rawText.lastIndexOf('}') + 1);
            const res = JSON.parse(cleanJson);

            // Inyectar en Tabla Dorada
            document.getElementById('table-body').innerHTML = `<tr><td>${res.dir}</td><td>${res.ent}</td><td>${res.sl}</td><td>${res.tp}</td></tr>`;
            document.getElementById('res-lotes').innerText = res.lotes;
            document.getElementById('res-veredicto').innerText = res.ver;
            document.getElementById('analysis-text').innerText = "ANÁLISIS ESTRATÉGICO:\n" + res.ana;

            status.innerHTML = '';
            container.style.display = 'block';

        } catch (e) {
            status.innerHTML = `<b style="color:red;">ERROR DE SINCRONIZACIÓN. REINTENTA.</b>`;
            console.log(e);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
