<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v21.3</title>
    <style>
        :root { --gold: #D4A017; --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .terminal { width: 100%; max-width: 600px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.7); overflow: hidden; }
        .header { background: #0f172a; padding: 25px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; color: var(--gold); letter-spacing: 2px; font-weight: 800; }
        .content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 10px; font-family: monospace; font-size: 15px; outline: none; }
        .btn-scan { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-scan:disabled { opacity: 0.5; }
        #output { background: #0f172a; padding: 20px; border-radius: 12px; min-height: 180px; font-size: 14px; line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; border: 1px solid var(--border); border-left: 4px solid var(--gold); }
        .ny-clock { font-family: monospace; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>GOLD ELITE v21.3</h1>
            <div id="clock" class="ny-clock">00:00:00 NY</div>
        </div>
        <div style="color: var(--accent); font-size: 10px; font-weight: bold; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px;">V21 CORE STABLE</div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div><label>SL Pips</label><input type="number" id="sl" value="20"></div>
        </div>
        <button class="btn-scan" id="scan-btn" onclick="ejecutarAnalisis()">⚡ EJECUTAR ANÁLISIS</button>
        <div id="output">Terminal restaurada. Sin optimizaciones de riesgo.</div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    setInterval(() => {
        document.getElementById('clock').textContent = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date()) + ' NY';
    }, 1000);

    async function ejecutarAnalisis() {
        const box = document.getElementById('output');
        const btn = document.getElementById('scan-btn');
        btn.disabled = true;
        box.innerHTML = '<span style="color: var(--gold); font-weight: bold;">⏳ ANALIZANDO...</span>';

        const prompt = "Trader Oro. Balance $" + document.getElementById('balance').value + ". Dame: Dirección, Entrada, SL, TP y Lotaje. Sé breve.";

        try {
            // USAMOS v1beta que suele ser menos estricta con los bloqueos CORS en archivos locales
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content) {
                box.innerText = data.candidates[0].content.parts[0].text;
            } else {
                box.innerHTML = "<b style='color:orange;'>AVISO:</b> Google no devolvió datos. Reintenta ahora.";
            }

        } catch (e) {
            box.innerHTML = "<b style='color:#ef4444;'>ERROR TÉCNICO:</b> No hay respuesta del servidor.<br>Espera 1 minuto y vuelve a pulsar.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
