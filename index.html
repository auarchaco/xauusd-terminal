<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v26</title>
    <style>
        :root { --gold: #D4A017; --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .terminal { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.7); overflow: hidden; }
        .header { background: #0f172a; padding: 25px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; color: var(--gold); letter-spacing: 2px; font-weight: 800; }
        .content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 10px; font-family: monospace; font-size: 15px; outline: none; }
        .btn-scan { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-scan:hover { background: #eab308; }
        .btn-scan:disabled { opacity: 0.5; cursor: wait; }
        #output { background: #0f172a; padding: 20px; border-radius: 12px; min-height: 180px; font-size: 14px; line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; border: 1px solid var(--border); border-left: 4px solid var(--gold); }
        .loader { color: var(--gold); font-weight: bold; text-align: center; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
        .ny-clock { font-family: monospace; font-size: 12px; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>GOLD ELITE v26</h1>
            <div id="clock" class="ny-clock">--:--:-- NY</div>
        </div>
        <div style="color: var(--accent); font-size: 10px; font-weight: bold; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px;">HYPER-SPEED ACTIVE</div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div><label>SL Pips</label><input type="number" id="sl" value="20"></div>
        </div>
        <button class="btn-scan" id="scan-btn" onclick="ejecutarAnalisis()">⚡ ESCANEO INSTANTÁNEO</button>
        <div id="output">Basado en v21 Core. Optimizado para latencia mínima.</div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    // Reloj NY en tiempo real
    setInterval(() => {
        document.getElementById('clock').textContent = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date()) + ' NY';
    }, 1000);

    async function ejecutarAnalisis() {
        const box = document.getElementById('output');
        const btn = document.getElementById('scan-btn');
        const bal = document.getElementById('balance').value;

        btn.disabled = true;
        box.innerHTML = '<div class="loader">⚡ ANALIZANDO...</div>';

        // Prompt ultra-corto (Procesamiento de IA más rápido)
        const prompt = `Trader XAUUSD. Balance $${bal}. Dame: Dirección, Entrada, SL, TP, Lotes. OPERAR/NO OPERAR.`;

        try {
            // Conexión Directa v1 (La ruta de producción más rápida de Google)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { 
                        maxOutputTokens: 120, // Reducido al mínimo para que la respuesta viaje más rápido
                        temperature: 0.1      // Respuesta mecánica y veloz
                    } 
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content) {
                box.innerText = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                // Si el nombre del modelo falla, probamos la ruta alternativa automáticamente solo una vez
                const altResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const altData = await altResponse.json();
                box.innerText = altData.candidates[0].content.parts[0].text;
            }

        } catch (e) {
            box.innerHTML = `<b style="color:#ef4444;">ERROR DE SISTEMA</b><br>Intenta de nuevo.`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
