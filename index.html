<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Elite Terminal v21.1</title>
    <style>
        :root { --gold: #D4A017; --bg: #020617; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .terminal { width: 100%; max-width: 550px; background: var(--card); border-radius: 15px; border: 1px solid #334155; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .header { background: #0f172a; padding: 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 5px; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #output { background: #0f172a; padding: 15px; border-radius: 10px; min-height: 150px; font-size: 14px; line-height: 1.6; border-left: 4px solid var(--gold); white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <h2 style="color:var(--gold); margin:0; font-size:18px;">GOLD ELITE v21.1</h2>
        <span id="clock" style="font-family:monospace; font-size:12px; color:#94a3b8;">--:-- NY</span>
    </div>
    <div class="content">
        <div class="grid">
            <div><label>Balance</label><input type="number" id="balance" value="1000"></div>
            <div><label>Riesgo %</label><input type="number" id="risk" value="1"></div>
            <div><label>SL Pips</label><input type="number" id="sl" value="20"></div>
        </div>
        <button class="btn" id="btn" onclick="analizar()">⚡ ESCANEAR AHORA</button>
        <div id="output">Listo para operar.</div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    // Reloj rápido
    setInterval(() => {
        const ny = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = ny + ' NY';
    }, 1000);

    async function analizar() {
        const out = document.getElementById('output');
        const btn = document.getElementById('btn');
        btn.disabled = true;
        out.innerHTML = "<span style='color:var(--gold)'>⏳ CONECTANDO...</span>";

        try {
            // MÉTODO V21 PURO: Detección y envío en una sola cadena de promesas
            const list = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${API_KEY}`);
            const models = await list.json();
            const model = models.models.find(m => m.name.includes('gemini-1.5-flash')).name;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1/${model}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Trader XAUUSD. Balance $" + document.getElementById('balance').value + ". Dame: Dirección, Entrada, SL, TP y Lotes. Breve." }] }]
                })
            });

            const data = await res.json();
            out.innerText = data.candidates[0].content.parts[0].text;

        } catch (e) {
            out.innerHTML = "<b style='color:#ef4444;'>ERROR DE SEÑAL</b><br>Reintenta ahora mismo.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
