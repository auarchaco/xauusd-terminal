<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>XAUUSD Terminal V14.0</title>
    <style>
        body { font-family: sans-serif; background: #020617; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app { width: 100%; max-width: 600px; background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; background: #D4A017; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #output { margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 8px; border-left: 4px solid #D4A017; white-space: pre-wrap; line-height: 1.6; min-height: 50px; }
        .loading { color: #D4A017; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <h2 style="color: #D4A017; text-align: center;">⚡ GOLD SCANNER V14</h2>
    
    <label style="font-size: 12px;">GOOGLE API KEY:</label>
    <input type="password" id="key" placeholder="Pega tu clave AIzaSy...">
    
    <label style="font-size: 12px;">BALANCE ($):</label>
    <input type="number" id="balance" value="1000">

    <button class="btn" onclick="ejecutarAnalisis()">⚡ ANALIZAR ORO AHORA</button>

    <div id="output">El análisis aparecerá aquí...</div>
</div>

<script>
    // Cargar clave guardada al abrir
    window.onload = () => {
        const savedKey = localStorage.getItem('gold_key');
        if (savedKey) document.getElementById('key').value = savedKey;
    };

    async function ejecutarAnalisis() {
        const key = document.getElementById('key').value.trim();
        const output = document.getElementById('output');
        const balance = document.getElementById('balance').value;

        if (!key) return alert("Por favor, ingresa tu API Key.");
        
        // Guardar clave para la próxima vez
        localStorage.setItem('gold_key', key);

        output.innerHTML = '<span class="loading">⏳ Conectando con Google AI...</span>';

        const prompt = `Eres un experto en trading. Analiza XAUUSD y DXY. Dame: 1. Dirección, 2. Entrada/SL/TP, 3. Lotes para una cuenta de ${balance} USD. Sé breve y directo.`;

        try {
            // USAMOS EL ENDPOINT ESTABLE v1
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            // GESTIÓN DE ERRORES MEJORADA
            if (data.error) {
                output.innerHTML = `<b style="color:#f87171;">ERROR DE GOOGLE:</b><br>${data.error.message}`;
                return;
            }

            // VALIDACIÓN DE RESPUESTA (Evita el error 'reading 0')
            if (data.candidates && data.candidates.length > 0 && data.candidates[0].content) {
                const texto = data.candidates[0].content.parts[0].text;
                output.innerText = texto;
            } else {
                output.innerHTML = `<b style="color:#fbbf24;">RESPUESTA VACÍA:</b><br>La clave funciona, pero Google no devolvió texto. Intenta de nuevo en unos segundos.`;
            }

        } catch (error) {
            output.innerHTML = `<b style="color:#f87171;">ERROR DE RED:</b><br>${error.message}`;
        }
    }
</script>

</body>
</html>
