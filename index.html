<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v22</title>
    <style>
        :root { --gold: #D4A017; --bg: #020617; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .terminal { width: 100%; max-width: 650px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 25px 50px rgba(0,0,0,0.7); overflow: hidden; }
        .header { background: #0f172a; padding: 25px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; color: var(--gold); letter-spacing: 3px; font-weight: 800; }
        .content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 10px; font-family: monospace; font-size: 15px; outline: none; }
        .btn-scan { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-scan:disabled { background: #475569; cursor: not-allowed; }
        
        /* Estilos de Tablas */
        .output-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: #0f172a; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .output-table th { background: #1e293b; color: var(--gold); font-size: 11px; text-transform: uppercase; padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
        .output-table td { padding: 15px; text-align: center; font-family: monospace; font-size: 16px; color: white; border-bottom: 1px solid var(--border); }
        .verdict-box { font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .operar { color: #22c55e; border: 1px solid #22c55e; }
        .no-operar { color: #ef4444; border: 1px solid #ef4444; }

        #output-container { min-height: 200px; }
        .loading { color: var(--gold); font-weight: bold; text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>GOLD ELITE v22</h1>
            <div id="clock" style="font-family: monospace; font-size: 12px; color: #94a3b8; margin-top: 5px;">00:00:00 NY TIME</div>
        </div>
        <div style="color: var(--accent); font-size: 10px; font-weight: bold; border: 1px solid var(--accent); padding: 4px 10px; border-radius: 20px;">V22 FAST-UI</div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div><label>SL Pips</label><input type="number" id="sl" value="20"></div>
        </div>
        <button class="btn-scan" id="scan-btn" onclick="ejecutarAnalisis()">Ejecutar Escaneo Macro</button>
        
        <div id="output-container">
            <div style="text-align:center; color:#475569; padding-top:40px;">Esperando parámetros...</div>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    setInterval(() => {
        const ny = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = ny + ' NY TIME';
    }, 1000);

    async function ejecutarAnalisis() {
        const container = document.getElementById('output-container');
        const btn = document.getElementById('scan-btn');
        const balance = document.getElementById('balance').value;
        const risk = document.getElementById('risk').value;
        const sl = document.getElementById('sl').value;

        btn.disabled = true;
        container.innerHTML = '<div class="loading">ANALIZANDO MERCADO...</div>';

        try {
            const prompt = `Actúa como Trader Institucional. Analiza XAUUSD. Responde ÚNICAMENTE en este formato JSON, nada más de texto:
            {"entrada": "valor", "sl": "valor", "tp": "valor", "direccion": "BUY/SELL", "lotes": "valor", "veredicto": "OPERAR/NO OPERAR"}
            Datos: Cuenta $${balance}, Riesgo ${risk}%, SL ${sl} pips.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const rawText = data.candidates[0].content.parts[0].text;
            // Limpiar posible formato Markdown del JSON
            const cleanJson = rawText.replace(/```json|```/g, "").trim();
            const res = JSON.parse(cleanJson);

            const verdictClass = res.veredicto.includes("NO") ? "no-operar" : "operar";

            container.innerHTML = `
                <table class="output-table">
                    <tr><th>Entrada</th><th>SL</th><th>TP</th></tr>
                    <tr><td>${res.entrada}</td><td>${res.sl}</td><td>${res.tp}</td></tr>
                </table>
                <table class="output-table">
                    <tr><th>Dirección</th><th>Lotes</th><th>Veredicto</th></tr>
                    <tr>
                        <td style="color:var(--gold); font-weight:bold;">${res.direccion}</td>
                        <td>${res.lotes}</td>
                        <td><span class="verdict-box ${verdictClass}">${res.veredicto}</span></td>
                    </tr>
                </table>
            `;

        } catch (e) {
            container.innerHTML = `<b style="color:#ef4444;">ERROR:</b> Respuesta inválida. Reintenta.`;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
