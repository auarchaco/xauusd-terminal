<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Elite Terminal v19</title>
    <style>
        :root {
            --gold: #D4A017;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
            --accent: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .terminal {
            width: 100%;
            max-width: 650px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .header {
            background: #0f172a;
            padding: 25px;
            border-bottom: 2px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { 
            font-size: 1.3rem; 
            color: var(--gold); 
            letter-spacing: 3px; 
            font-weight: 800;
        }

        .status-badge {
            font-size: 10px;
            background: rgba(34, 197, 94, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .pulse {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .content { padding: 30px; display: flex; flex-direction: column; gap: 20px; }

        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--gold); outline: none; background: #161e2e; }

        .btn-scan {
            width: 100%;
            padding: 20px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-scan:hover { background: #eab308; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(212, 160, 23, 0.4); }
        .btn-scan:disabled { background: #475569; cursor: not-allowed; transform: none; box-shadow: none; }

        #output {
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--gold);
            min-height: 180px;
            font-size: 14px;
            line-height: 1.8;
            color: #cbd5e1;
            white-space: pre-wrap;
            border: 1px solid var(--border);
            border-left: 4px solid var(--gold);
        }

        .loader-text { color: var(--gold); font-weight: bold; text-align: center; display: block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>
            <h1>GOLD ELITE v19</h1>
            <div style="font-family: monospace; font-size: 12px; color: #94a3b8; margin-top: 5px;" id="clock">--:--:-- NY</div>
        </div>
        <div class="status-badge">
            <div class="pulse"></div> CONEXIÓN ESTABLE
        </div>
    </div>

    <div class="content">
        <div class="grid-inputs">
            <div class="input-group"><label>Balance ($)</label><input type="number" id="balance" value="1000"></div>
            <div class="input-group"><label>Riesgo (%)</label><input type="number" id="risk" value="1"></div>
            <div class="input-group"><label>Stop Loss</label><input type="number" id="sl" value="20"></div>
        </div>

        <button class="btn-scan" id="scan-btn" onclick="runSmartAnalysis()">Ejecutar Escaneo Inteligente</button>

        <div id="output">Terminal lista. Esperando instrucciones macro...</div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCoYRkhb_4MEMTQEhHzZmD2ofKXyMEVN2U";

    setInterval(() => {
        const nyTime = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(new Date());
        document.getElementById('clock').textContent = nyTime + ' NY TIME';
    }, 1000);

    async function runSmartAnalysis() {
        const box = document.getElementById('output');
        const btn = document.getElementById('scan-btn');
        const bal = document.getElementById('balance').value;

        btn.disabled = true;
        box.innerHTML = '<div class="loader-text">Probando protocolos de conexión de Google...</div>';

        const prompt = `Analiza XAUUSD y DXY para scalping. Cuenta $${bal}. Dame: Dirección, Entrada, SL, TP y Lotes. Veredicto: OPERAR/NO OPERAR.`;

        // Intentamos con las 3 rutas posibles que Google acepta según la región y tipo de cuenta
        const endpoints = [
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`
        ];

        let success = false;

        for (let url of endpoints) {
            if (success) break;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0].content) {
                    box.innerText = data.candidates[0].content.parts[0].text;
                    success = true;
                } else if (data.error) {
                    console.log("Fallo ruta:", url, data.error.message);
                }
            } catch (e) {
                console.log("Error de red en ruta:", url);
            }
        }

        if (!success) {
            box.innerHTML = `<b style="color:#ef4444;">ERROR CRÍTICO:</b> No se encontró un modelo compatible. Verifica que tu API Key tenga permisos de "Generative Language API" en Google AI Studio.`;
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
